name: Sync to HF Space

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'harness.html'
      - 'harness.js'
      - 'models.json'
      - 'build/jspi/**'
      - 'build/asyncify/**'
      - 'spaces/**'
      - '.github/workflows/sync-to-hf-space.yml'
  workflow_dispatch:

concurrency:
  group: sync-to-hf-space
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        env:
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_SPACE_REPO" ] || [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_SPACE_REPO (repo variable) or HF_TOKEN (secret) missing — skipping sync."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP != '1'
        with:
          lfs: true

      - uses: actions/setup-node@v4
        if: env.SKIP != '1'
        with:
          node-version: '20'

      - name: Install dependencies
        if: env.SKIP != '1'
        run: npm ci || npm install

      - name: Mirror models.json into site/
        if: env.SKIP != '1'
        run: |
          # The dashboard now reads benchmark records live from the HF
          # dataset (no static combined.json baseline), so the only repo→
          # site copy we still need is models.json — used by the run page
          # to enumerate quants/variants.
          cp models.json site/models.json

      - name: Stage deploy assets
        if: env.SKIP != '1'
        run: |
          mkdir -p _deploy
          # Flatten site/ to Space root: index.html, css/, js/, data/, models.json, methodology.html, ...
          cp -R site/. _deploy/
          # Harness drives runner.js and lives at Space root alongside index.html.
          cp harness.html harness.js _deploy/
          # Space README (with hf_oauth + app_file frontmatter) overrides any
          # README that might have been copied from site/.
          cp spaces/README.md _deploy/README.md
          # WASM artifacts are gitignored. If a prior local build committed
          # them as bin/bench.{js,wasm}, sync them; otherwise the Space keeps
          # the WASM from the last manual `hf upload` push unchanged.
          if [ -f build/jspi/bin/bench.js ] && [ -f build/asyncify/bin/bench.js ]; then
            mkdir -p _deploy/build/jspi _deploy/build/asyncify
            cp build/jspi/bin/bench.js build/jspi/bin/bench.wasm _deploy/build/jspi/
            cp build/asyncify/bin/bench.js build/asyncify/bin/bench.wasm _deploy/build/asyncify/
            # build-info.json is emitted by build.sh next to the wasm; copy
            # alongside so the browser can stamp llama.cpp commit/describe
            # onto each record. Optional — older WASM dirs may not have it.
            [ -f build/jspi/bin/build-info.json ] && cp build/jspi/bin/build-info.json _deploy/build/jspi/ || true
            [ -f build/asyncify/bin/build-info.json ] && cp build/asyncify/bin/build-info.json _deploy/build/asyncify/ || true
            echo "Included WASM artifacts in bundle."
          else
            echo "No build/ artifacts found; leaving Space WASM untouched."
          fi
          # .nojekyll so GH-style rules don't mangle underscored dirs if any.
          touch _deploy/.nojekyll
          du -sh _deploy | awk '{print "Deploy bundle: "$1}'

      - name: Push to HF Space
        if: env.SKIP != '1'
        env:
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          git config --global user.email "actions@github.com"
          git config --global user.name  "GitHub Actions"

          # Clone the Space repo (supports LFS in case WASM files are large).
          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" _space
          cd _space

          # If the staging bundle included build/*/bench.{js,wasm}, sync
          # those too; otherwise exclude build/** so the Space's manually-
          # uploaded WASM is preserved across CI runs.
          # --exclude='.git' preserves git internals; --exclude='.gitattributes'
          # preserves HF's LFS/Xet tracking rules for .wasm; --exclude='build/**'
          # preserves any manually-uploaded WASM when CI doesn't have a local build.
          if [ -d ../_deploy/build ]; then
            RSYNC_EXCLUDES=(--exclude='.git' --exclude='.gitattributes')
          else
            RSYNC_EXCLUDES=(--exclude='.git' --exclude='.gitattributes' --exclude='build/**')
          fi
          rsync -a --delete "${RSYNC_EXCLUDES[@]}" ../_deploy/ ./
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          SHA="${GITHUB_SHA::10}"
          git commit -m "sync from ${GITHUB_REPOSITORY}@${SHA}"
          git push
