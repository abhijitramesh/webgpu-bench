name: Sync to HF Space

on:
  push:
    branches: [main]
    paths:
      - 'bench.html'
      - 'bench-*.js'
      - 'bench.css'
      - 'harness.html'
      - 'harness.js'
      - 'bench-core.js'
      - 'bench-source.js'
      - 'bench-device.js'
      - 'bench-hub.js'
      - 'bench-config.js'
      - 'models.json'
      - 'build/jspi/**'
      - 'build/asyncify/**'
      - 'spaces/**'
      - '.github/workflows/sync-to-hf-space.yml'
  workflow_dispatch:

concurrency:
  group: sync-to-hf-space
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        env:
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_SPACE_REPO" ] || [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_SPACE_REPO (repo variable) or HF_TOKEN (secret) missing — skipping sync."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP != '1'
        with:
          lfs: true

      - name: Stage deploy assets
        if: env.SKIP != '1'
        run: |
          mkdir -p _deploy
          cp bench.html _deploy/index.html
          cp bench.html bench.css bench-app.js bench-core.js bench-source.js \
             bench-device.js bench-hub.js bench-config.js _deploy/
          cp harness.html harness.js _deploy/
          cp models.json _deploy/
          cp spaces/README.md _deploy/README.md
          # WASM artifacts are gitignored. If a prior local build committed
          # them as bin/bench.{js,wasm}, sync them; otherwise the Space keeps
          # the WASM from the last manual `hf upload` push unchanged.
          if [ -f build/jspi/bin/bench.js ] && [ -f build/asyncify/bin/bench.js ]; then
            mkdir -p _deploy/build/jspi _deploy/build/asyncify
            cp build/jspi/bin/bench.js build/jspi/bin/bench.wasm _deploy/build/jspi/
            cp build/asyncify/bin/bench.js build/asyncify/bin/bench.wasm _deploy/build/asyncify/
            echo "Included WASM artifacts in bundle."
          else
            echo "No build/ artifacts found; leaving Space WASM untouched."
          fi
          # .nojekyll so GH-style rules don't mangle underscored dirs if any.
          touch _deploy/.nojekyll
          du -sh _deploy | awk '{print "Deploy bundle: "$1}'

      - name: Push to HF Space
        if: env.SKIP != '1'
        env:
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          git config --global user.email "actions@github.com"
          git config --global user.name  "GitHub Actions"

          # Clone the Space repo (supports LFS in case WASM files are large).
          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" _space
          cd _space

          # If the staging bundle included build/*/bench.{js,wasm}, sync
          # those too; otherwise exclude build/** so the Space's manually-
          # uploaded WASM is preserved across CI runs.
          if [ -d ../_deploy/build ]; then
            RSYNC_EXCLUDES=(--exclude='.git')
          else
            RSYNC_EXCLUDES=(--exclude='.git' --exclude='build/**')
          fi
          rsync -a --delete "${RSYNC_EXCLUDES[@]}" ../_deploy/ ./
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          SHA="${GITHUB_SHA::10}"
          git commit -m "sync from ${GITHUB_REPOSITORY}@${SHA}"
          git push
