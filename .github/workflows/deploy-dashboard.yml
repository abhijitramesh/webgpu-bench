name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'site/**'
      - 'scripts/build-site.js'
      - 'scripts/sync-from-dataset.mjs'
      - '.github/workflows/deploy-dashboard.yml'
  schedule:
    # Pull new HF dataset submissions roughly every 30 minutes.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync HF dataset into data/machines/
        env:
          HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_DATASET_REPO" ]; then
            echo "HF_DATASET_REPO repo variable not set; skipping dataset sync and using committed data/machines/*.json"
          else
            node scripts/sync-from-dataset.mjs
          fi

      - name: Build combined data
        run: node scripts/build-site.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
